<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Glúnta Church Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #profile-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      width: 330px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: white;
      padding: 14px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
    }

    #profile-panel h2 {
      margin: 0 0 10px 0;
      font-size: 20px;
    }

    #profile-panel h3 {
      margin-top: 14px;
      font-size: 16px;
    }

    #profile-summary {
      background: #f2f2f2;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    #profile-church-list {
      padding-left: 20px;
      margin-top: 8px;
    }

    #profile-church-list li {
      margin-bottom: 8px;
      line-height: 1.3;
    }

    #right-panel-stack {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-height: calc(100vh - 24px);
      pointer-events: none;
    }

    #control-panel,
    #church-detail-panel {
      background: white;
      padding: 14px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
      pointer-events: auto;
    }

    #control-panel h2 {
      margin: 0 0 12px 0;
      font-size: 20px;
    }

    #control-panel label.control-label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      font-size: 14px;
    }

    #searchInput,
    #boundaryLayerSelect {
      width: 100%;
      box-sizing: border-box;
      padding: 7px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    #affiliationFilterBox {
      max-height: 160px;
      overflow-y: auto;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      background: white;
      font-size: 13px;
    }

    .affiliation-option {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 7px;
      line-height: 1.25;
      cursor: pointer;
    }

    .affiliation-option:last-child {
      margin-bottom: 0;
    }

    .affiliation-option input {
      margin: 0;
      flex-shrink: 0;
    }

    .affiliation-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(0, 0, 0, 0.25);
      flex-shrink: 0;
    }

    #affiliationFilterHint {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
      line-height: 1.3;
    }

    .button {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #resetMapButton {
      background: #333;
    }

    #clearSelectionButton {
      background: #888;
    }

    #church-count {
      margin-top: 12px;
      font-size: 14px;
    }

    #church-detail-panel {
      max-height: calc(100vh - 390px);
      overflow-y: auto;
    }

    #church-detail-panel h2 {
      margin: 0 0 10px 0;
      font-size: 19px;
    }

    #church-detail-panel h3 {
      margin: 0 0 8px 0;
      font-size: 17px;
      line-height: 1.25;
    }

    .detail-empty {
      color: #666;
      font-size: 14px;
      line-height: 1.4;
    }

    .detail-row {
      margin-bottom: 10px;
      line-height: 1.35;
      font-size: 14px;
    }

    .detail-label {
      font-weight: bold;
      display: block;
      margin-bottom: 2px;
    }

    .denomination-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      border: 1px solid rgba(0, 0, 0, 0.25);
    }

    .popup-denomination {
      margin-top: 8px;
      font-style: italic;
    }

    .leaflet-control-zoom {
      margin-bottom: 20px !important;
      margin-right: 12px !important;
    }

    @media (max-width: 800px) {
      #map {
        height: 65vh;
      }

      #profile-panel,
      #right-panel-stack {
        position: static;
        width: auto;
        max-height: none;
        margin: 10px;
      }

      #right-panel-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #church-detail-panel {
        max-height: none;
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="profile-panel">
    <h2 id="profile-title">County Profile</h2>

    <div id="profile-summary">
      Click a county to view population and church data.
    </div>

    <h3 id="profile-list-heading">Churches in this county</h3>
    <ol id="profile-church-list"></ol>
  </div>

  <div id="right-panel-stack">
    <div id="control-panel">
      <h2>Church Map</h2>

      <label class="control-label" for="boundaryLayerSelect">Boundary layer</label>
      <select id="boundaryLayerSelect">
        <option value="county">Counties</option>
        <option value="lea">LEAs</option>
      </select>

      <label class="control-label" for="searchInput">Search</label>
      <input
        type="text"
        id="searchInput"
        placeholder="Search church, town, county..."
      />

      <label class="control-label">Denomination or affiliation</label>

      <div id="affiliationFilterBox">
        Loading affiliations...
      </div>

      <div id="affiliationFilterHint">
        Tick one or more. Leave all unticked to show all.
      </div>

      <button id="resetMapButton" class="button">Reset map</button>
      <button id="clearSelectionButton" class="button">Clear boundary selection</button>

      <div id="church-count">Loading churches...</div>
    </div>

    <div id="church-detail-panel">
      <h2>Church Details</h2>
      <div id="church-detail-content" class="detail-empty">
        Click a church dot on the map to view its details here.
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="script.js?v=0.6.3"></script>
</body>
</html>
