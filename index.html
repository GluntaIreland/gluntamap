<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Glúnta Research Map</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9D83SGW102"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Your stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="app">
    <aside id="sidebar">
      <h1>Glúnta Research Map</h1>

      <p class="intro">
        A developing missiological map of Protestant and evangelical church presence in the Republic of Ireland.
      </p>

      <div id="controls">
        <input
          type="text"
          id="searchBox"
          placeholder="Search churches or places..."
        />

        <div id="filters"></div>

        <button id="resetMapButton" type="button">
          Reset Map
        </button>
      </div>

      <div id="selectedInfo">
        <h2>Map Information</h2>
        <p>Select a church, boundary, or gospel opportunity to see more details.</p>
      </div>
    </aside>

    <main id="map"></main>
  </div>

  <!-- PapaParse for CSV loading -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Your map script -->
  <script src="script.js"></script>
</body>
</html>
