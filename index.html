<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Glúnta Church Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #profile-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      width: 330px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: white;
      padding: 14px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    #profile-panel h2 {
      margin: 0 0 10px 0;
      font-size: 20px;
    }

    #profile-summary {
      background: #f2f2f2;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    #profile-church-list li {
      margin-bottom: 8px;
    }

    #right-panel-stack {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      pointer-events: none;
    }

    #control-panel,
    #church-detail-panel {
      background: white;
      padding: 14px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      pointer-events: auto;
    }

    #control-panel h2 {
      margin: 0 0 12px 0;
      font-size: 20px;
    }

    #control-panel label.control-label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      font-size: 14px;
    }

    #searchInput,
    #boundaryLayerSelect {
      width: 100%;
      padding: 7px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    /* 🔧 REDUCED HEIGHT */
    #affiliationFilterBox {
      max-height: 115px;
      overflow-y: auto;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
    }

    .affiliation-option {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .affiliation-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(0,0,0,0.25);
    }

    #gospelOpportunityLegend {
      margin-top: 10px;
      padding: 9px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
      font-size: 13px;
    }

    .legend-swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 6px;
      border-radius: 2px;
    }

    .urban-opportunity-marker {
      width: 15px;
      height: 15px;
      background: white;
      border: 2px solid black;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }

    .button {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #resetMapButton { background: #333; }
    #clearSelectionButton { background: #888; }

    #church-count {
      margin-top: 12px;
    }

    /* 🔧 BIGGER DETAILS PANEL */
    #church-detail-panel {
      min-height: 170px;
      max-height: 260px;
      overflow-y: auto;
    }

    .detail-empty {
      color: #666;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="profile-panel">
  <h2 id="profile-title">County Profile</h2>
  <div id="profile-summary">Click a county to view data.</div>
  <h3>Churches</h3>
  <ol id="profile-church-list"></ol>
</div>

<div id="right-panel-stack">

  <div id="control-panel">
    <h2>Church Map</h2>

    <label class="control-label">Boundary layer</label>
    <select id="boundaryLayerSelect">
      <option value="county">Counties</option>
      <option value="lea">LEAs</option>
      <option value="urban">Urban Zones</option>
      <option value="gospel">Gospel Opportunities</option>
    </select>

    <div id="gospelOpportunityLegend">
      <strong>Gospel Opportunities</strong><br>
      <div><span class="legend-swatch" style="background:#8b0000;"></span>Urgent</div>
      <div><span class="legend-swatch" style="background:#e74c3c;"></span>High</div>
      <div><span class="legend-swatch" style="background:#f39c12;"></span>Significant</div>
      <div><span class="legend-swatch" style="background:#9ccc65;"></span>Lower</div>
      <div><span class="legend-swatch" style="background:#2e8b57;"></span>Established Presence</div>

      <div style="margin-top:8px;">
        <span class="urban-opportunity-marker" style="display:inline-block;margin-right:6px;"></span>
        Unreached Towns
      </div>
    </div>

    <label class="control-label">Search</label>
    <input type="text" id="searchInput" placeholder="Search..." />

    <label class="control-label">Denomination</label>
    <div id="affiliationFilterBox">Loading...</div>

    <button id="resetMapButton" class="button">Reset map</button>
    <button id="clearSelectionButton" class="button">Clear selection</button>

    <div id="church-count"></div>
  </div>

  <div id="church-detail-panel">
    <h2>Church Details</h2>
    <div id="church-detail-content" class="detail-empty">
      Click a church to view details.
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<script src="script.js?v=0.8.1"></script>

</body>
</html>
