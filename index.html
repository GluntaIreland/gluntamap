<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Glúnta Ireland Church Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">✣</span>
      <span>Glúnta Ireland Church Map</span>
    </div>

    <nav>
      <a href="#">About</a>
      <a href="#">Methodology</a>
      <a href="#">Data</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>Map controls</h2>

        <label class="label">Colour map by:</label>

        <div class="toggle-group">
          <button id="denominationMode" class="toggle active">
            Denomination / Affiliation
          </button>
          <button id="traditionMode" class="toggle">
            Broad Tradition
          </button>
        </div>
      </section>

      <section class="panel">
        <h2>Search</h2>
        <input
          id="searchInput"
          type="text"
          placeholder="Search churches..."
        />
      </section>

      <section class="panel">
        <h2>Filters</h2>

        <select id="traditionFilter">
          <option value="">All traditions</option>
        </select>

        <select id="denominationFilter">
          <option value="">All denominations</option>
        </select>
      </section>

      <section class="panel summary-panel">
        <h2 id="summaryTitle">Summary</h2>
        <div id="summaryList"></div>
        <div class="summary-total">
          <span>Total</span>
          <strong id="summaryTotal">0</strong>
        </div>
      </section>

      <section class="hint-box">
        <strong>ⓘ</strong>
        <div>
          <p>Zoom in to view more churches.</p>
          <p>Click a point for more information.</p>
        </div>
      </section>
    </aside>

    <section class="map-wrap">
      <div id="map"></div>

      <div id="legend" class="legend">
        <h3 id="legendTitle">Broad Tradition</h3>
        <div id="legendItems"></div>
        <div class="legend-total">
          <strong id="legendTotal">0 churches</strong>
        </div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
